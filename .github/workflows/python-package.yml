# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install FFmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: |
          uv sync
      - name: Install CPU PyTorch
        run: |
          uv pip install torch torchaudio torchvision torchcodec --index-url https://download.pytorch.org/whl/cpu --reinstall
      - name: Verify CPU torch
        run: |
          uv run --no-sync python -c "import torch; print(f'torch={torch.__version__}'); assert 'cu' not in torch.__version__, 'CUDA torch detected'"
          uv run --no-sync python -c "from torchcodec.decoders import AudioDecoder; print('torchcodec OK')"
      - name: Run pre-commit hook
        run: |
          uv run --no-sync pre-commit run -a
        env:
          UV_NO_SYNC: "1"
